# tunli-server nginx example configuration
#
# Replace "yourdomain.com" with your actual domain throughout.
# Assumes SSL certificates are managed by certbot or similar.
#
# This single server block covers all subdomains:
#   api.yourdomain.com      → API server
#   relay.yourdomain.com    → Socket relay
#   *.yourdomain.com        → Tunnel proxy
#
# The tunli router process handles subdomain routing internally.

server {
    server_name *.yourdomain.com;

    listen 443 ssl;
    http2 on;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Recommended SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:10000;

        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    access_log /var/log/nginx/tunli_access.log;
    error_log  /var/log/nginx/tunli_error.log;
}

# Redirect HTTP → HTTPS
server {
    server_name *.yourdomain.com;
    listen 80;
    return 301 https://$host$request_uri;
}
